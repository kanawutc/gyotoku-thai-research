<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oracle Skills Comparison — PimQuin vs Boom Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Prompt', sans-serif; background: #0a0a0f; color: #e2e8f0; min-height: 100vh; }

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 8px rgba(139, 92, 246, 0.2); }
  50% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }
}
@keyframes countUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Hero */
.hero {
  text-align: center;
  padding: 60px 20px 40px;
  background: linear-gradient(135deg, #0f0a1a 0%, #1a0f2e 40%, #0f1a3e 100%);
  border-bottom: 1px solid rgba(139, 92, 246, 0.2);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
              radial-gradient(circle at 70% 50%, rgba(99, 102, 241, 0.06) 0%, transparent 50%);
  animation: pulseGlow 6s ease-in-out infinite;
  pointer-events: none;
}
.hero h1 {
  font-size: 2.4rem;
  font-weight: 800;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #a78bfa, #818cf8, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fadeInUp 0.6s ease-out;
  position: relative;
}
.hero .subtitle {
  color: #94a3b8;
  font-size: 1.05rem;
  margin-bottom: 16px;
  animation: fadeInUp 0.6s ease-out 0.1s both;
  position: relative;
}
.hero .vs-badge {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  background: rgba(139, 92, 246, 0.1);
  border: 1px solid rgba(139, 92, 246, 0.25);
  border-radius: 24px;
  font-size: 0.95rem;
  font-weight: 600;
  animation: fadeInUp 0.6s ease-out 0.2s both;
  position: relative;
}
.vs-badge .pimquin { color: #a78bfa; }
.vs-badge .vs { color: #475569; font-weight: 400; font-size: 0.8rem; }
.vs-badge .boom { color: #f97316; }

/* Stats bar */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 16px;
  padding: 24px 20px;
  background: #0f0f18;
  border-bottom: 1px solid #1e1e2e;
  flex-wrap: wrap;
}
.stat {
  text-align: center;
  padding: 12px 20px;
  background: rgba(30, 30, 50, 0.5);
  border-radius: 12px;
  border: 1px solid #1e1e2e;
  min-width: 120px;
  animation: countUp 0.5s ease-out both;
  transition: transform 0.2s, border-color 0.2s;
}
.stat:hover {
  transform: translateY(-2px);
  border-color: rgba(139, 92, 246, 0.3);
}
.stat:nth-child(1) { animation-delay: 0.1s; }
.stat:nth-child(2) { animation-delay: 0.2s; }
.stat:nth-child(3) { animation-delay: 0.3s; }
.stat:nth-child(4) { animation-delay: 0.4s; }
.stat:nth-child(5) { animation-delay: 0.5s; }
.stat-num {
  font-size: 2rem;
  font-weight: 800;
  line-height: 1.2;
}
.stat-num.purple {
  background: linear-gradient(135deg, #a78bfa, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-num.orange {
  background: linear-gradient(135deg, #fb923c, #f97316);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-num.green {
  background: linear-gradient(135deg, #4ade80, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-num.blue {
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-label {
  font-size: 0.7rem;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}

/* Main */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 20px;
}

/* Section */
.section {
  margin-bottom: 40px;
  animation: fadeInUp 0.6s ease-out both;
}
.section:nth-child(1) { animation-delay: 0.2s; }
.section:nth-child(2) { animation-delay: 0.4s; }
.section:nth-child(3) { animation-delay: 0.6s; }

.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid #1e1e2e;
}
.section-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.section-icon.green { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); }
.section-icon.purple { background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.3); }
.section-icon.orange { background: rgba(249, 115, 22, 0.15); border: 1px solid rgba(249, 115, 22, 0.3); }
.section-title {
  font-size: 1.3rem;
  font-weight: 700;
}
.section-title.green { color: #4ade80; }
.section-title.purple { color: #a78bfa; }
.section-title.orange { color: #fb923c; }
.section-count {
  font-size: 0.8rem;
  padding: 3px 10px;
  border-radius: 12px;
  font-weight: 600;
}
.section-count.green { background: rgba(34, 197, 94, 0.12); color: #4ade80; }
.section-count.purple { background: rgba(139, 92, 246, 0.12); color: #a78bfa; }
.section-count.orange { background: rgba(249, 115, 22, 0.12); color: #fb923c; }
.section-subtitle {
  font-size: 0.85rem;
  color: #64748b;
  margin-left: auto;
}

/* Pills */
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 500;
  font-family: 'Inter', monospace;
  cursor: default;
  transition: all 0.2s ease;
  animation: slideIn 0.3s ease-out both;
}
.pill .slash { opacity: 0.5; font-weight: 400; }
.pill .check { font-size: 0.75rem; }

/* Green shared */
.pill.green {
  background: rgba(34, 197, 94, 0.08);
  border: 1px solid rgba(34, 197, 94, 0.2);
  color: #86efac;
}
.pill.green:hover {
  background: rgba(34, 197, 94, 0.18);
  border-color: rgba(34, 197, 94, 0.5);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(34, 197, 94, 0.15);
}

/* Purple PimQuin only */
.pill.purple {
  background: rgba(139, 92, 246, 0.08);
  border: 1px solid rgba(139, 92, 246, 0.2);
  color: #c4b5fd;
}
.pill.purple:hover {
  background: rgba(139, 92, 246, 0.18);
  border-color: rgba(139, 92, 246, 0.5);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(139, 92, 246, 0.15);
}

/* Orange Boom only */
.pill.orange {
  background: rgba(249, 115, 22, 0.08);
  border: 1px solid rgba(249, 115, 22, 0.2);
  color: #fdba74;
}
.pill.orange:hover {
  background: rgba(249, 115, 22, 0.18);
  border-color: rgba(249, 115, 22, 0.5);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(249, 115, 22, 0.15);
}

/* Summary */
.summary {
  margin-top: 48px;
  padding: 32px;
  background: linear-gradient(135deg, rgba(30, 30, 60, 0.4), rgba(20, 20, 40, 0.6));
  border: 1px solid #2a2a3e;
  border-radius: 16px;
  animation: fadeInUp 0.6s ease-out 0.8s both;
}
.summary h2 {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #a78bfa, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 640px) {
  .summary-grid { grid-template-columns: 1fr; }
}
.summary-card {
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #1e1e2e;
  transition: transform 0.2s, border-color 0.2s;
}
.summary-card:hover {
  transform: translateY(-2px);
}
.summary-card.pimquin {
  background: rgba(139, 92, 246, 0.06);
  border-color: rgba(139, 92, 246, 0.2);
}
.summary-card.pimquin:hover { border-color: rgba(139, 92, 246, 0.4); }
.summary-card.boom {
  background: rgba(249, 115, 22, 0.06);
  border-color: rgba(249, 115, 22, 0.2);
}
.summary-card.boom:hover { border-color: rgba(249, 115, 22, 0.4); }
.summary-card h3 {
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.summary-card.pimquin h3 { color: #a78bfa; }
.summary-card.boom h3 { color: #fb923c; }
.summary-card ul {
  list-style: none;
  padding: 0;
}
.summary-card li {
  padding: 6px 0;
  font-size: 0.9rem;
  color: #94a3b8;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  line-height: 1.5;
}
.summary-card li::before {
  content: '';
  flex-shrink: 0;
  margin-top: 6px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
}
.summary-card.pimquin li::before { background: #a78bfa; }
.summary-card.boom li::before { background: #fb923c; }
.summary-card .skill-mention {
  font-family: 'Inter', monospace;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 0.8rem;
}
.summary-card.pimquin .skill-mention { background: rgba(139, 92, 246, 0.15); color: #c4b5fd; }
.summary-card.boom .skill-mention { background: rgba(249, 115, 22, 0.15); color: #fdba74; }

/* Overlap meter */
.overlap-bar {
  margin-top: 24px;
  padding: 20px 24px;
  background: rgba(20, 20, 35, 0.5);
  border-radius: 12px;
  border: 1px solid #1e1e2e;
}
.overlap-label {
  font-size: 0.85rem;
  color: #94a3b8;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}
.overlap-track {
  width: 100%;
  height: 10px;
  background: #1e1e2e;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
.overlap-fill {
  height: 100%;
  border-radius: 8px;
  background: linear-gradient(90deg, #4ade80, #22c55e);
  transition: width 1.5s ease-out;
}

/* Footer */
.footer {
  text-align: center;
  padding: 32px 20px;
  border-top: 1px solid #1e1e2e;
  color: #475569;
  font-size: 0.85rem;
  margin-top: 20px;
}

/* Responsive */
@media (max-width: 768px) {
  .hero h1 { font-size: 1.6rem; }
  .stats-bar { gap: 8px; }
  .stat { min-width: 90px; padding: 10px 12px; }
  .stat-num { font-size: 1.5rem; }
  .section-subtitle { display: none; }
  .pills { gap: 6px; }
  .pill { font-size: 0.78rem; padding: 5px 10px; }
}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <h1>Oracle Skills Comparison</h1>
  <p class="subtitle">เปรียบเทียบ skill sets ของ Oracle ทั้งสองตัว</p>
  <div class="vs-badge">
    <span class="pimquin">PimQuin Oracle</span>
    <span class="vs">vs</span>
    <span class="boom">Boom Oracle</span>
  </div>
</div>

<!-- Stats Bar -->
<div class="stats-bar" id="stats-bar"></div>

<!-- Main Content -->
<div class="container">
  <!-- Shared Skills -->
  <div class="section" id="shared-section"></div>

  <!-- Only PimQuin -->
  <div class="section" id="pimquin-section"></div>

  <!-- Only Boom -->
  <div class="section" id="boom-section"></div>

  <!-- Summary -->
  <div class="summary">
    <h2>Recommendations &amp; Analysis</h2>

    <div class="overlap-bar">
      <div class="overlap-label">
        <span>Skill Overlap</span>
        <span id="overlap-pct"></span>
      </div>
      <div class="overlap-track">
        <div class="overlap-fill" id="overlap-fill" style="width: 0%"></div>
      </div>
    </div>

    <div class="summary-grid" style="margin-top: 24px;">
      <div class="summary-card pimquin">
        <h3>PimQuin ควรเพิ่ม Skills</h3>
        <ul id="pimquin-recs"></ul>
      </div>
      <div class="summary-card boom">
        <h3>Boom Oracle ควรเพิ่ม Skills</h3>
        <ul id="boom-recs"></ul>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  Oracle Skills Comparison &copy; 2026 | PimQuin Oracle &#x1F981;
</div>

<script>
const pimquinSkills = [
  'about-oracle','auto-retrospective','awaken','bampenpien','birth','bud','contacts',
  'create-shortcut','deep-research','dig','dream','feel','fleet','forward','forward-lite',
  'fyi','gemini','go','harden','i-believed','inbox','incubate','learn','machines','mailbox',
  'merged','morpheus','oracle-family-scan','oracle-soul-sync-update','oraclenet','philosophy',
  'physical','project','recap','recap-lite','release','resonance','retrospective','rrr',
  'rrr-lite','schedule','skills-list','speak','standup','startup.md','talk-to','team-agents',
  'trace','vault','warp','watch','where-we-are','who-are-you','work-with','worktree','wormhole','xray'
];

const boomSkills = [
  'awaken','rrr','recap','forward','trace','learn','inbox','contacts',
  'oracle-soul-sync-update','oracle-family-scan','philosophy','who-are-you','about-oracle',
  'create-shortcut','standup','feel','xray','go','dig','where-we-are','recap-lite','rrr-lite',
  'forward-lite','time-travel','merged','worktree','project','incubate','vault','dream',
  'talk-to','oraclenet','speak','machines','team-agents','gemini','watch','schedule',
  'deep-research','stealth-browse','explain-visual','fyi','auto-retrospective','resonance',
  'i-believed','bampenpien','oracle','retrospective','ux-ui','boom-loop','toh-agent','physical'
];

const pimSet = new Set(pimquinSkills);
const boomSet = new Set(boomSkills);

const shared = pimquinSkills.filter(s => boomSet.has(s)).sort();
const onlyPim = pimquinSkills.filter(s => !boomSet.has(s)).sort();
const onlyBoom = boomSkills.filter(s => !pimSet.has(s)).sort();

// Stats
const statsBar = document.getElementById('stats-bar');
const stats = [
  { num: pimquinSkills.length, label: 'PimQuin Total', cls: 'purple' },
  { num: boomSkills.length, label: 'Boom Total', cls: 'orange' },
  { num: shared.length, label: 'Shared', cls: 'green' },
  { num: onlyPim.length, label: 'Only PimQuin', cls: 'blue' },
  { num: onlyBoom.length, label: 'Only Boom', cls: 'orange' },
];
stats.forEach(s => {
  const div = document.createElement('div');
  div.className = 'stat';
  div.innerHTML = `<div class="stat-num ${s.cls}">${s.num}</div><div class="stat-label">${s.label}</div>`;
  statsBar.appendChild(div);
});

// Render pills
function renderPills(arr, cls) {
  return arr.map((s, i) => {
    const check = cls === 'green' ? '<span class="check">&#x2714;&#x2714;</span>' : '';
    return `<span class="pill ${cls}" style="animation-delay:${i * 30}ms">${check}<span class="slash">/</span>${s}</span>`;
  }).join('');
}

// Shared section
document.getElementById('shared-section').innerHTML = `
  <div class="section-header">
    <div class="section-icon green">&#x2705;</div>
    <span class="section-title green">Shared Skills</span>
    <span class="section-count green">${shared.length} skills</span>
    <span class="section-subtitle">ทั้งสองมีเหมือนกัน</span>
  </div>
  <div class="pills">${renderPills(shared, 'green')}</div>
`;

// PimQuin only
document.getElementById('pimquin-section').innerHTML = `
  <div class="section-header">
    <div class="section-icon purple">&#x1F981;</div>
    <span class="section-title purple">Only PimQuin</span>
    <span class="section-count purple">${onlyPim.length} skills</span>
    <span class="section-subtitle">Skills ที่ Boom Oracle ยังไม่มี</span>
  </div>
  <div class="pills">${renderPills(onlyPim, 'purple')}</div>
`;

// Boom only
document.getElementById('boom-section').innerHTML = `
  <div class="section-header">
    <div class="section-icon orange">&#x1F525;</div>
    <span class="section-title orange">Only Boom Oracle</span>
    <span class="section-count orange">${onlyBoom.length} skills</span>
    <span class="section-subtitle">Skills ที่ PimQuin ยังไม่มี</span>
  </div>
  <div class="pills">${renderPills(onlyBoom, 'orange')}</div>
`;

// Overlap
const totalUnique = new Set([...pimquinSkills, ...boomSkills]).size;
const overlapPct = Math.round((shared.length / totalUnique) * 100);
document.getElementById('overlap-pct').textContent = `${overlapPct}% (${shared.length}/${totalUnique} unique skills)`;
setTimeout(() => {
  document.getElementById('overlap-fill').style.width = overlapPct + '%';
}, 300);

// Recommendations
const pimRecsEl = document.getElementById('pimquin-recs');
const boomRecsEl = document.getElementById('boom-recs');

const pimRecs = [
  { skill: 'stealth-browse', reason: 'เปิดเว็บแบบ stealth mode สำหรับ research' },
  { skill: 'explain-visual', reason: 'อธิบายรูปภาพ/screenshots ด้วย AI vision' },
  { skill: 'time-travel', reason: 'ดูย้อน session เก่าข้าม timeline' },
  { skill: 'ux-ui', reason: 'วิเคราะห์ UX/UI design ได้ทันที' },
  { skill: 'boom-loop', reason: 'Boom Loop automation pattern' },
  { skill: 'toh-agent', reason: 'ตั้งค่า agent เฉพาะทาง' },
  { skill: 'oracle', reason: 'Core oracle meta-skill' },
];

const boomRecs = [
  { skill: 'fleet', reason: 'Deep census ของ Oracle ทั้งหมดทุก node' },
  { skill: 'harden', reason: 'Audit config เรื่อง safety และ governance' },
  { skill: 'release', reason: 'Automated release — bump, changelog, tag, push' },
  { skill: 'warp', reason: 'Teleport ไปยัง remote oracle node ผ่าน SSH' },
  { skill: 'wormhole', reason: 'Federated query ข้าม oracle nodes' },
  { skill: 'morpheus', reason: 'Speculative dreaming — background thinking' },
  { skill: 'bud', reason: 'สร้าง Oracle ใหม่ผ่าน maw bud' },
  { skill: 'birth', reason: 'Prepare birth props สำหรับ Oracle ใหม่' },
  { skill: 'mailbox', reason: 'Persistent mailbox สำหรับ agent communication' },
  { skill: 'skills-list', reason: 'List skills ทั้งหมดพร้อม metadata' },
  { skill: 'work-with', reason: 'Cross-oracle collaboration แบบ persistent' },
  { skill: 'startup.md', reason: 'จัดการ startup configuration' },
];

pimRecs.forEach(r => {
  const li = document.createElement('li');
  li.innerHTML = `<span class="skill-mention">/&zwj;${r.skill}</span> ${r.reason}`;
  pimRecsEl.appendChild(li);
});

boomRecs.forEach(r => {
  const li = document.createElement('li');
  li.innerHTML = `<span class="skill-mention">/&zwj;${r.skill}</span> ${r.reason}`;
  boomRecsEl.appendChild(li);
});
</script>
</body>
</html>
